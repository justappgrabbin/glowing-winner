
# Create a single comprehensive YAML file that does it all
single_yaml = '''# Repository Organization & Syntax Checker
# Single-file configuration for repo structure and error checking
# Usage: Save as .github/workflows/repo-check.yml or run with act

name: Repo Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # STRUCTURE CHECKS
      - name: Check Required Directories
        run: |
          for dir in src tests docs; do
            if [ ! -d "$dir" ]; then
              echo "::error::Missing required directory: $dir"
              exit 1
            fi
          done
          echo "✅ Structure OK"
      
      - name: Check Forbidden Files
        run: |
          found=$(find . -name "*.log" -o -name "*.tmp" -o -name ".DS_Store" | grep -v node_modules | grep -v .git | wc -l)
          if [ "$found" -gt 0 ]; then
            echo "::error::Found $found forbidden files"
            find . -name "*.log" -o -name "*.tmp" -o -name ".DS_Store" | grep -v node_modules | grep -v .git
            exit 1
          fi
          echo "✅ No forbidden files"

      # YAML SYNTAX CHECK
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install yamllint
        run: pip install yamllint
      
      - name: Check YAML Syntax
        run: |
          cat > .yamllint << 'EOF'
          extends: default
          rules:
            line-length: {max: 120}
            indentation: {spaces: 2}
            trailing-spaces: enable
            new-line-at-end-of-file: enable
          EOF
          yamllint -c .yamllint . || exit 1
          echo "✅ YAML syntax OK"

      # JSON SYNTAX CHECK
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Check JSON Syntax
        run: |
          npm install -g jsonlint
          find . -name "*.json" -not -path "*/node_modules/*" -not -path "*/.git/*" | while read f; do
            if ! jsonlint "$f" > /dev/null 2>&1; then
              echo "::error::Invalid JSON: $f"
              exit 1
            fi
          done
          echo "✅ JSON syntax OK"

      # LANGUAGE-SPECIFIC CHECKS (auto-detect)
      - name: Detect & Check Python
        run: |
          if [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then
            pip install flake8 black
            flake8 src/ tests/ --max-line-length=100 --ignore=E203,W503 || exit 1
            black --check src/ tests/ || exit 1
            echo "✅ Python OK"
          fi

      - name: Detect & Check JavaScript
        run: |
          if [ -f "package.json" ]; then
            npm ci
            npx eslint . --ext .js,.jsx,.ts,.tsx || exit 1
            npx prettier --check "**/*.{js,jsx,ts,tsx,json,md}" || exit 1
            echo "✅ JavaScript/TypeScript OK"
          fi

      - name: Detect & Check Go
        run: |
          if [ -f "go.mod" ]; then
            if [ -n "$(gofmt -l .)" ]; then
              echo "::error::Go formatting issues:"
              gofmt -l .
              exit 1
            fi
            go vet ./... || exit 1
            echo "✅ Go OK"
          fi

      - name: Detect & Check Rust
        run: |
          if [ -f "Cargo.toml" ]; then
            cargo fmt -- --check || exit 1
            cargo clippy -- -D warnings || exit 1
            echo "✅ Rust OK"
          fi

      # REPORT
      - name: Generate Report
        if: always()
        run: |
          echo "## Repository Check Report" > report.md
          echo "- **Commit**: ${{ github.sha }}" >> report.md
          echo "- **Branch**: ${{ github.ref_name }}" >> report.md
          echo "- **Status**: ${{ job.status }}" >> report.md
          cat report.md
      
      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-report
          path: report.md
'''

output_dir = "/mnt/kimi/output"
os.makedirs(output_dir, exist_ok=True)

with open(f"{output_dir}/repo-check.yml", "w") as f:
    f.write(single_yaml)

print("✅ Created single YAML file: repo-check.yml")
print(f"   Location: {output_dir}/repo-check.yml")
print(f"   Size: {len(single_yaml)} bytes")
print("\n📋 This one YAML file includes:")
print("   • Structure validation (dirs, forbidden files)")
print("   • YAML syntax checking (yamllint)")
print("   • JSON syntax checking (jsonlint)")
print("   • Python linting (flake8, black)")
print("   • JavaScript/TypeScript linting (eslint, prettier)")
print("   • Go formatting and vetting")
print("   • Rust formatting and clippy")
print("   • Auto-detection of project type")
print("   • Report generation")
print("\n🚀 Usage:")
print("   1. Save to .github/workflows/repo-check.yml")
print("   2. Push to GitHub - it runs automatically")
print("   3. Or run locally: act -j check")
