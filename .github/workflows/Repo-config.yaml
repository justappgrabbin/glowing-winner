# Repository Organization & Error Checking Configuration
# Version: 1.0.0
# Description: Comprehensive repo management with syntax validation

schema_version: "1.0.0"

# Repository Structure Definition
repository:
  name: "${REPO_NAME}"
  type: "${REPO_TYPE}"  # library, app, service, monorepo
  language: "${PRIMARY_LANGUAGE}"  # python, javascript, typescript, go, rust, etc.
  
  # Directory Structure Rules
  structure:
    required_directories:
      - name: "src"
        description: "Source code"
        required_files: ["index.*", "main.*"]
        
      - name: "tests"
        description: "Test files"
        pattern: "**/*.{test,spec}.{js,ts,py,go,rs}"
        
      - name: "docs"
        description: "Documentation"
        required_files: ["README.md"]
        
      - name: ".github"
        description: "GitHub workflows"
        required_files: ["workflows/ci.yml"]
    
    optional_directories:
      - name: "scripts"
        description: "Build and utility scripts"
      - name: "config"
        description: "Configuration files"
      - name: "assets"
        description: "Static assets"
      - name: "examples"
        description: "Example usage"
  
  # File Organization Rules
  files:
    naming_conventions:
      python: "snake_case"
      javascript: "camelCase"
      typescript: "PascalCase for classes, camelCase for functions"
      go: "snake_case for files, CamelCase for exports"
      rust: "snake_case"
    
    max_size_kb: 500
    forbidden_patterns:
      - "*.log"
      - "*.tmp"
      - "*.cache"
      - "node_modules"
      - "__pycache__"
      - ".DS_Store"

# Syntax Checking Configuration
syntax_check:
  enabled: true
  fail_on_error: true
  
  # Language-specific checkers
  checkers:
    yaml:
      enabled: true
      tools:
        - name: "yamllint"
          command: "yamllint -c .yamllint.yml"
          config: |
            extends: default
            rules:
              line-length:
                max: 120
              indentation:
                spaces: 2
              trailing-spaces: enable
              new-line-at-end-of-file: enable
      
    json:
      enabled: true
      tools:
        - name: "jsonlint"
          command: "jsonlint"
        - name: "jq"
          command: "jq empty"
      
    python:
      enabled: true
      tools:
        - name: "flake8"
          command: "flake8 --max-line-length=100 --ignore=E203,W503"
        - name: "pylint"
          command: "pylint --disable=C0103,R0903"
        - name: "mypy"
          command: "mypy --ignore-missing-imports"
        - name: "black"
          command: "black --check --diff"
      
    javascript:
      enabled: true
      tools:
        - name: "eslint"
          command: "eslint --ext .js,.jsx"
        - name: "prettier"
          command: "prettier --check"
      
    typescript:
      enabled: true
      tools:
        - name: "tsc"
          command: "tsc --noEmit"
        - name: "eslint"
          command: "eslint --ext .ts,.tsx"
        - name: "prettier"
          command: "prettier --check '**/*.{ts,tsx}'"
      
    go:
      enabled: true
      tools:
        - name: "gofmt"
          command: "gofmt -l"
        - name: "golint"
          command: "golint"
        - name: "go vet"
          command: "go vet ./..."
      
    rust:
      enabled: true
      tools:
        - name: "cargo check"
          command: "cargo check"
        - name: "clippy"
          command: "cargo clippy -- -D warnings"
        - name: "rustfmt"
          command: "rustfmt --check"
    
    markdown:
      enabled: true
      tools:
        - name: "markdownlint"
          command: "markdownlint"
        - name: "mdformat"
          command: "mdformat --check"

# Dependency Checking
dependencies:
  enabled: true
  
  security_scan:
    - tool: "safety"
      language: python
      command: "safety check"
    - tool: "npm audit"
      language: javascript
      command: "npm audit --audit-level moderate"
    - tool: "cargo audit"
      language: rust
      command: "cargo audit"
  
  outdated_check:
    - tool: "pip list --outdated"
      language: python
    - tool: "npm outdated"
      language: javascript
    - tool: "cargo outdated"
      language: rust

# Git Hooks Configuration
git_hooks:
  pre_commit:
    - id: "trailing-whitespace"
    - id: "end-of-file-fixer"
    - id: "check-yaml"
    - id: "check-json"
    - id: "check-added-large-files"
      args: ["--maxkb=1000"]
    - id: "check-merge-conflict"
    - id: "detect-private-key"
  
  commit_msg:
    pattern: "^(feat|fix|docs|style|refactor|test|chore)(\\(.+\\))?: .+"
    error_message: "Commit message must follow conventional commits format"

# CI/CD Pipeline Configuration
ci_pipeline:
  triggers:
    - push:
        branches: [main, develop]
    - pull_request:
        branches: [main]
  
  stages:
    - name: "lint"
      jobs:
        - syntax_check_all
        - format_check
      
    - name: "test"
      jobs:
        - unit_tests
        - integration_tests
      needs: [lint]
      
    - name: "security"
      jobs:
        - dependency_scan
        - secret_scan
        - code_scan
      needs: [test]
      
    - name: "build"
      jobs:
        - compile
        - package
      needs: [security]

# Error Reporting
error_reporting:
  format: "json"  # json, xml, html
  output_dir: "./reports"
  
  levels:
    - name: "critical"
      color: "red"
      exit_code: 1
      notify: true
    - name: "error"
      color: "red"
      exit_code: 1
    - name: "warning"
      color: "yellow"
      exit_code: 0
    - name: "info"
      color: "blue"
      exit_code: 0
  
  notifications:
    slack:
      webhook: "${SLACK_WEBHOOK_URL}"
      channel: "#dev-alerts"
    email:
      smtp_server: "${SMTP_SERVER}"
      to: "dev-team@example.com"
