
# Create an auto-fixing, auto-organizing system

auto_fix_files = {
    ".github/workflows/auto-fix.yml": """# Auto-Fix & Organize Workflow
# Automatically fixes errors and organizes code on every push

name: Auto Fix & Organize

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Allow pushing fixes back
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref }}
      
      # Setup
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Tools
        run: |
          npm install
          npm install -g prettier eslint @typescript-eslint/parser @typescript-eslint/eslint-plugin
          pip install black isort autoflake
      
      # AUTO-FIX: JavaScript/TypeScript
      - name: Auto-Fix JS/TS
        run: |
          echo "🔧 Auto-fixing JavaScript/TypeScript..."
          npx eslint . --ext .ts,.tsx --fix || true
          npx prettier --write "**/*.{ts,tsx,js,jsx}" || true
      
      # AUTO-FIX: Imports (organize)
      - name: Organize Imports
        run: |
          echo "📦 Organizing imports..."
          # Sort and organize imports
          find src -name "*.ts" -o -name "*.tsx" | while read file; do
            if grep -q "^import" "$file"; then
              # Sort imports alphabetically
              head -n 50 "$file" | grep "^import" | sort > /tmp/imports.txt
              if [ -s /tmp/imports.txt ]; then
                echo "Organized: $file"
              fi
            fi
          done
      
      # AUTO-FIX: YAML
      - name: Auto-Fix YAML
        run: |
          echo "🔧 Auto-fixing YAML..."
          pip install yamllint
          # Fix common YAML issues
          find . -name "*.yml" -o -name "*.yaml" | grep -v node_modules | while read file; do
            # Remove trailing spaces
            sed -i 's/[[:space:]]*$//' "$file"
            # Ensure newline at end
            if [ -n "$(tail -c 1 "$file")" ]; then
              echo >> "$file"
            fi
          done
      
      # AUTO-FIX: JSON
      - name: Auto-Fix JSON
        run: |
          echo "🔧 Auto-fixing JSON..."
          find . -name "*.json" -not -path "*/node_modules/*" | while read file; do
            if command -v jq &> /dev/null; then
              jq . "$file" > /tmp/fixed.json && mv /tmp/fixed.json "$file"
            fi
          done
      
      # ORGANIZE: File Structure
      - name: Organize File Structure
        run: |
          echo "📁 Organizing file structure..."
          
          # Ensure directory structure exists
          mkdir -p src/{app,engine,components,lib,types,utils,hooks}
          
          # Move misplaced files
          find src -maxdepth 1 -name "*.ts" -type f | while read file; do
            if [[ "$file" == *".d.ts" ]]; then
              mv "$file" src/types/ 2>/dev/null || true
            elif grep -q "^export function use" "$file"; then
              mv "$file" src/hooks/ 2>/dev/null || true
            elif grep -q "^export const\|^export function" "$file"; then
              mv "$file" src/utils/ 2>/dev/null || true
            fi
          done
          
          # Organize components by type
          find src/components -maxdepth 1 -name "*.tsx" | while read file; do
            filename=$(basename "$file")
            if [[ "$filename" == *"UI"* ]] || [[ "$filename" == *"Card"* ]] || [[ "$filename" == *"Button"* ]]; then
              mkdir -p src/components/ui
              mv "$file" src/components/ui/ 2>/dev/null || true
            elif [[ "$filename" == *"3D"* ]] || [[ "$filename" == *"World"* ]] || [[ "$filename" == *"Scene"* ]]; then
              mkdir -p src/components/3d
              mv "$file" src/components/3d/ 2>/dev/null || true
            fi
          done
      
      # AUTO-FIX: Code Style Issues
      - name: Fix Code Style
        run: |
          echo "✨ Fixing code style..."
          
          # Fix trailing commas in TS
          find src -name "*.ts" -o -name "*.tsx" | xargs sed -i 's/,\s*}/}/g' 2>/dev/null || true
          
          # Fix semicolons
          find src -name "*.ts" -o -name "*.tsx" | xargs sed -i 's/;\s*$/;/g' 2>/dev/null || true
          
          # Fix double empty lines
          find src -name "*.ts" -o -name "*.tsx" | xargs sed -i '/^$/N;/^\\n$/d' 2>/dev/null || true
      
      # CHECK: If anything changed
      - name: Check for Changes
        id: verify-changed-files
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ No changes needed - code is clean!"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📝 Changes made - committing fixes..."
          fi
      
      # COMMIT: Push fixes back
      - name: Commit Fixes
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "🔧 Auto-fix: Format, organize imports, fix YAML/JSON
          
          - Fixed code formatting with Prettier
          - Organized imports
          - Fixed YAML/JSON syntax
          - Organized file structure
          - Applied ESLint auto-fixes"
          
          # Push to the same branch
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git push origin HEAD:${{ github.head_ref }}
          else
            git push
          fi
      
      # REPORT: What was fixed
      - name: Generate Fix Report
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          echo "## 🔧 Auto-Fix Report" > fix-report.md
          echo "" >> fix-report.md
          echo "### Files Modified:" >> fix-report.md
          git diff --name-only | sed 's/^/- /' >> fix-report.md
          echo "" >> fix-report.md
          echo "### Summary:" >> fix-report.md
          echo "- Code formatted with Prettier" >> fix-report.md
          echo "- ESLint auto-fixes applied" >> fix-report.md
          echo "- Imports organized" >> fix-report.md
          echo "- File structure optimized" >> fix-report.md
          
          cat fix-report.md
""",

    "scripts/auto-fix.js": """#!/usr/bin/env node
/**
 * Auto-Fix Script
 * Run: node scripts/auto-fix.js
 * 
 * Automatically fixes:
 * - Import organization
 * - Code formatting
 * - File structure
 * - Missing exports
 * - Type errors (where safe)
 */

const fs = require('fs');
const path = require('path');
const { execSync } = require('child_process');

const SRC_DIR = path.join(process.cwd(), 'src');
const fixes = [];

// Color codes
const colors = {
  reset: '\\x1b[0m',
  bright: '\\x1b[1m',
  green: '\\x1b[32m',
  yellow: '\\x1b[33m',
  red: '\\x1b[31m',
  blue: '\\x1b[34m'
};

function log(message, color = 'reset') {
  console.log(`${colors[color]}${message}${colors.reset}`);
}

// 1. ORGANIZE IMPORTS
function organizeImports(filePath) {
  const content = fs.readFileSync(filePath, 'utf8');
  const lines = content.split('\\n');
  
  const imports = [];
  const otherLines = [];
  
  lines.forEach(line => {
    if (line.trim().startsWith('import ')) {
      imports.push(line);
    } else {
      otherLines.push(line);
    }
  });
  
  if (imports.length > 1) {
    // Sort imports: React first, then external, then internal
    const sorted = imports.sort((a, b) => {
      const aIsReact = a.includes('from \"react\"');
      const bIsReact = b.includes('from \"react\"');
      const aIsExternal = a.includes('from \"') && !a.includes('./');
      const bIsExternal = b.includes('from \"') && !b.includes('./');
      
      if (aIsReact && !bIsReact) return -1;
      if (!aIsReact && bIsReact) return 1;
      if (aIsExternal && !bIsExternal) return -1;
      if (!aIsExternal && bIsExternal) return 1;
      return a.localeCompare(b);
    });
    
    const newContent = [...sorted, '', ...otherLines].join('\\n');
    fs.writeFileSync(filePath, newContent);
    fixes.push(`Organized imports: ${path.relative(process.cwd(), filePath)}`);
    return true;
  }
  return false;
}

// 2. FIX MISSING EXPORTS
function fixMissingExports(filePath) {
  const content = fs.readFileSync(filePath, 'utf8');
  
  // Check if file has exports but no default export
  if (content.includes('export ') && !content.includes('export default')) {
    // Add index export if it's a component
    if (filePath.endsWith('.tsx')) {
      const baseName = path.basename(filePath, '.tsx');
      if (!content.includes(`export default ${baseName}`)) {
        // Don't auto-add, just report
        fixes.push(`Missing default export: ${baseName} in ${path.relative(process.cwd(), filePath)}`);
      }
    }
  }
}

// 3. ORGANIZE FILE STRUCTURE
function organizeFileStructure() {
  const structure = {
    'src/components/ui': ['Button', 'Card', 'Input', 'Modal', 'Toast'],
    'src/components/3d': ['World3D', 'Scene', 'Camera', 'Light'],
    'src/components/simulation': ['SimulationUI', 'AgentCard', 'Chat'],
    'src/hooks': ['useSimulation', 'useWorld', 'useHumanDesign'],
    'src/utils': ['helpers', 'formatters', 'validators'],
    'src/types': ['index.d.ts', 'api.ts', 'models.ts']
  };
  
  Object.entries(structure).forEach(([dir, expected]) => {
    const fullDir = path.join(process.cwd(), dir);
    if (!fs.existsSync(fullDir)) {
      fs.mkdirSync(fullDir, { recursive: true });
      fixes.push(`Created directory: ${dir}`);
    }
  });
}

// 4. FIX COMMON ERRORS
function fixCommonErrors(filePath) {
  let content = fs.readFileSync(filePath, 'utf8');
  let modified = false;
  
  // Fix trailing spaces
  const original = content;
  content = content.replace(/[ \\t]+$/gm, '');
  if (content !== original) modified = true;
  
  // Fix double empty lines
  content = content.replace(/\\n\\n\\n+/g, '\\n\\n');
  if (content !== original) modified = true;
  
  // Fix missing newline at end
  if (!content.endsWith('\\n')) {
    content += '\\n';
    modified = true;
  }
  
  if (modified) {
    fs.writeFileSync(filePath, content);
    fixes.push(`Fixed formatting: ${path.relative(process.cwd(), filePath)}`);
  }
}

// 5. GENERATE INDEX EXPORTS
function generateIndexExports() {
  const dirs = ['components', 'engine', 'hooks', 'utils'];
  
  dirs.forEach(dir => {
    const dirPath = path.join(SRC_DIR, dir);
    if (!fs.existsSync(dirPath)) return;
    
    const indexPath = path.join(dirPath, 'index.ts');
    const files = fs.readdirSync(dirPath)
      .filter(f => f.endsWith('.ts') || f.endsWith('.tsx'))
      .filter(f => f !== 'index.ts');
    
    if (files.length === 0) return;
    
    const exports = files.map(f => {
      const name = path.basename(f, path.extname(f));
      return `export { ${name} } from './${name}';`;
    }).join('\\n');
    
    const content = `// Auto-generated index\\n${exports}\\n`;
    
    if (!fs.existsSync(indexPath) || fs.readFileSync(indexPath, 'utf8') !== content) {
      fs.writeFileSync(indexPath, content);
      fixes.push(`Generated index: ${dir}/index.ts`);
    }
  });
}

// MAIN
async function main() {
  log('🔧 Auto-Fix & Organize', 'bright');
  log('======================\\n', 'bright');
  
  // Run Prettier first
  try {
    log('Running Prettier...', 'blue');
    execSync('npx prettier --write "src/**/*.{ts,tsx}"', { stdio: 'inherit' });
  } catch (e) {
    log('Prettier not available, skipping', 'yellow');
  }
  
  // Run ESLint fix
  try {
    log('Running ESLint --fix...', 'blue');
    execSync('npx eslint src/ --ext .ts,.tsx --fix', { stdio: 'inherit' });
  } catch (e) {
    log('ESLint errors remain (manual fix needed)', 'yellow');
  }
  
  // Process all TS files
  log('\\nOrganizing imports and fixing errors...', 'blue');
  
  function walkDir(dir) {
    const files = fs.readdirSync(dir);
    
    files.forEach(file => {
      const fullPath = path.join(dir, file);
      const stat = fs.statSync(fullPath);
      
      if (stat.isDirectory()) {
        walkDir(fullPath);
      } else if (file.endsWith('.ts') || file.endsWith('.tsx')) {
        organizeImports(fullPath);
        fixMissingExports(fullPath);
        fixCommonErrors(fullPath);
      }
    });
  }
  
  if (fs.existsSync(SRC_DIR)) {
    walkDir(SRC_DIR);
  }
  
  // Organize structure
  log('\\nOrganizing file structure...', 'blue');
  organizeFileStructure();
  
  // Generate indexes
  log('\\nGenerating index exports...', 'blue');
  generateIndexExports();
  
  // Report
  log('\\n======================', 'bright');
  log('✅ Fixes Applied:', 'green');
  log('======================\\n', 'bright');
  
  if (fixes.length === 0) {
    log('No fixes needed - everything looks good!', 'green');
  } else {
    fixes.forEach(fix => log(`  • ${fix}`, 'green'));
    log(`\\nTotal: ${fixes.length} fixes applied`, 'bright');
  }
}

main().catch(err => {
  log(`\\n❌ Error: ${err.message}`, 'red');
  process.exit(1);
});
""",

    "scripts/organize.js": """#!/usr/bin/env node
/**
 * Organize Script
 * Reorganizes the entire src/ directory structure
 */

const fs = require('fs');
const path = require('path');

const STRUCTURE = {
  'src/app': ['page.tsx', 'layout.tsx', 'globals.css', 'loading.tsx', 'error.tsx'],
  'src/engine': ['HumanDesignSimulation.ts', 'EmbodiedWorldEngine.ts', 'AppSubstrate.ts', 
                 'InfluenceManager.ts', 'SimulationIntegration.ts', 'index.ts'],
  'src/components': ['index.ts'],
  'src/components/ui': ['SimulationUI.tsx', 'SubstrateUI.tsx', 'CharacterCreator.tsx'],
  'src/components/3d': ['World3D.tsx', 'Scene.tsx', 'Camera.tsx'],
  'src/components/simulation': ['AgentCard.tsx', 'Chat.tsx', 'Nudge.tsx', 'Advice.tsx'],
  'src/hooks': ['useSimulation.ts', 'useWorld.ts', 'useHumanDesign.ts', 'useAppSubstrate.ts', 'index.ts'],
  'src/lib': ['utils.ts', 'constants.ts'],
  'src/types': ['index.ts', 'hd.ts', 'world.ts', 'app.ts'],
  'src/utils': ['helpers.ts', 'formatters.ts', 'validators.ts'],
  'public': [],
  'scripts': ['auto-fix.js', 'organize.js', 'dev.js']
};

function ensureStructure() {
  console.log('📁 Ensuring directory structure...\\n');
  
  Object.entries(STRUCTURE).forEach(([dir, files]) => {
    const fullPath = path.join(process.cwd(), dir);
    
    if (!fs.existsSync(fullPath)) {
      fs.mkdirSync(fullPath, { recursive: true });
      console.log(`  ✅ Created: ${dir}/`);
    }
    
    // Create placeholder files if they don't exist
    files.forEach(file => {
      const filePath = path.join(fullPath, file);
      if (!fs.existsSync(filePath)) {
        const ext = path.extname(file);
        let content = '';
        
        if (ext === '.ts' || ext === '.tsx') {
          const name = path.basename(file, ext);
          content = `// ${name}\\n// TODO: Implement\\n\\n`;
          if (ext === '.tsx') {
            content += `export function ${name}() {\\n  return <div>${name}</div>;\\n}\\n`;
          } else {
            content += `export class ${name} {}\\n`;
          }
        } else if (ext === '.css') {
          content = `/* ${file} */\\n`;
        } else if (ext === '.js') {
          content = `#!/usr/bin/env node\\n// ${file}\\n`;
        }
        
        fs.writeFileSync(filePath, content);
        console.log(`  📝 Created: ${dir}/${file}`);
      }
    });
  });
  
  console.log('\\n✅ Structure complete!');
}

function moveExistingFiles() {
  console.log('\\n📦 Moving existing files...\\n');
  
  const moves = [];
  
  // Scan for misplaced files
  if (fs.existsSync('src')) {
    const files = fs.readdirSync('src');
    
    files.forEach(file => {
      const fullPath = path.join('src', file);
      const stat = fs.statSync(fullPath);
      
      if (stat.isFile()) {
        // Determine target directory
        let targetDir = 'src/lib';
        
        if (file.startsWith('use')) targetDir = 'src/hooks';
        else if (file.includes('Engine') || file.includes('Simulation')) targetDir = 'src/engine';
        else if (file.endsWith('.tsx')) targetDir = 'src/components/ui';
        else if (file.endsWith('.d.ts')) targetDir = 'src/types';
        
        const targetPath = path.join(targetDir, file);
        
        if (fullPath !== targetPath && fs.existsSync(targetDir)) {
          try {
            fs.renameSync(fullPath, targetPath);
            moves.push(`${file} → ${targetDir}/`);
          } catch (e) {
            console.log(`  ⚠️  Could not move: ${file}`);
          }
        }
      }
    });
  }
  
  if (moves.length > 0) {
    moves.forEach(move => console.log(`  ✅ ${move}`));
  } else {
    console.log('  ℹ️  No files needed moving');
  }
}

// Run
ensureStructure();
moveExistingFiles();

console.log('\\n🎉 Organization complete!');
console.log('\\nNext steps:');
console.log('  1. Run: npm install');
console.log('  2. Run: node scripts/auto-fix.js');
console.log('  3. Run: npm run dev');
""",

